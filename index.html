    <script>
  // سكريبت سريع التنفيذ يتحقق من الـ LocalStorage قبل تحميل React
  if (localStorage.getItem('dokkany_theme') === 'dark') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
</script>
